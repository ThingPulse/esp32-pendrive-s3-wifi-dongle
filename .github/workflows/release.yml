name: ESP App Market release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing SemVer tag to build and publish (for example v1.2.0-rc.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Validate requested tag
        run: python3 -c "import re,sys; sys.exit(0 if re.fullmatch(r'v(?:0|[1-9][0-9]*)\\.(?:0|[1-9][0-9]*)\\.(?:0|[1-9][0-9]*)(?:-[0-9A-Za-z.-]+)?(?:\\+[0-9A-Za-z.-]+)?', sys.argv[1]) else 1)" "$RELEASE_TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Build firmware with pinned ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.2
          target: esp32s3
          command: idf.py fullclean build

      - name: Generate and validate release assets
        run: |
          python3 scripts/app_market.py generate --version "$RELEASE_TAG"
          python3 scripts/app_market.py validate release/app-market.json

      - name: Determine release type
        id: release_type
        run: echo "prerelease=$(python3 scripts/app_market.py is-prerelease "$RELEASE_TAG")" >> "$GITHUB_OUTPUT"

      - name: Verify assets immediately before upload
        run: python3 scripts/app_market.py validate release/app-market.json

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --prerelease=${{ steps.release_type.outputs.prerelease }}
          else
            gh release create "$RELEASE_TAG" --verify-tag --generate-notes --prerelease=${{ steps.release_type.outputs.prerelease }}
          fi
          gh release upload "$RELEASE_TAG" release/app-market.json release/*.bin --clobber
